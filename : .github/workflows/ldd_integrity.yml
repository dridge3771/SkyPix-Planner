name: LDD Integrity Check

on:
  push:
    paths:
      - 'SkyPix_LDD_Master.md'
  pull_request:
    paths:
      - 'SkyPix_LDD_Master.md'

jobs:
  integrity-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check LDD integrity
        run: |
          FILE="SkyPix_LDD_Master.md"

          # Get actual line count
          ACTUAL=$(wc -l < "$FILE")

          # Extract expected line count from top nugget (line 6)
          EXPECTED=$(grep -m1 "^LDD VERSION:" "$FILE" | grep -oP 'LINES:\s*\K[0-9]+')

          # Extract version string for reporting
          VERSION=$(grep -m1 "^LDD VERSION:" "$FILE" | grep -oP 'LDD VERSION:\s*\K[^\s|]+')

          # Verify tail nugget exists and version matches
          TAIL_VERSION=$(grep "^LDD END:" "$FILE" | tail -1 | grep -oP 'LDD END:\s*\K[^\s|]+')

          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  SkyPix LDD Integrity Report"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  Version   : $VERSION"
          echo "  Expected  : $EXPECTED lines"
          echo "  Actual    : $ACTUAL lines"
          echo "  Top nugget: $VERSION"
          echo "  Tail nugget: $TAIL_VERSION"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          # Check 1: line count matches nugget
          if [ "$ACTUAL" != "$EXPECTED" ]; then
            echo "❌ INTEGRITY FAIL: Line count mismatch"
            echo "   Expected $EXPECTED — got $ACTUAL"
            echo "   Possible truncation or edit without nugget update."
            exit 1
          fi

          # Check 2: tail nugget exists
          if [ -z "$TAIL_VERSION" ]; then
            echo "❌ INTEGRITY FAIL: Tail nugget missing"
            echo "   LDD END line not found. File may be truncated."
            exit 1
          fi

          # Check 3: top and tail version strings match
          if [ "$VERSION" != "$TAIL_VERSION" ]; then
            echo "❌ INTEGRITY FAIL: Version mismatch between nuggets"
            echo "   Top: $VERSION — Tail: $TAIL_VERSION"
            echo "   Update both nuggets to the same version string."
            exit 1
          fi

          echo "✅ INTEGRITY PASS: $ACTUAL lines, version $VERSION, nuggets match"
